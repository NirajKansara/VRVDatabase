<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRV Dashboard</title>
    <style>
        :root { --bg: #f0f2f5; --primary: #2c3e50; --accent: #3498db; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; }

        /* LOGIN SECTION */
        #login-section { text-align: center; padding-top: 100px; }
        .login-card { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: inline-block; }
        .login-card input { padding: 12px; width: 250px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; outline: none; }
        
        /* DASHBOARD SQUARE BOXES - 5 IN A ROW */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
            margin: 20px 0; 
        }
        .stat-card { 
            background: var(--white); 
            border-radius: 12px; 
            text-align: center; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border-top: 6px solid #ddd;
            aspect-ratio: 1 / 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .stat-card h3 { margin: 0; font-size: 0.8em; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 10px 0 0; font-size: 2.2em; font-weight: bold; color: var(--primary); }
        .stat-card.active-filter { border-top-color: var(--accent); background: #eef7ff; }

        /* COLORS FOR FILTERS */
        #stat-Active { border-top-color: #2ecc71; }
        #stat-Due { border-top-color: #f1c40f; }
        #stat-Expired { border-top-color: #e74c3c; }
        #stat-Complimentary { border-top-color: #9b59b6; }
        #stat-All { border-top-color: #34495e; }

        /* TOP ACTION BAR */
        .action-bar { 
            background: var(--white); 
            padding: 15px 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        .action-bar input, .action-bar button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; }

        /* MEMBER CARDS */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .mag-card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid #ccc; position: relative; }
        .mag-card h2 { margin: 0 0 12px; font-size: 1.25em; color: var(--primary); text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .mag-card p { margin: 8px 0; color: #555; font-size: 0.95em; }
        .mag-card strong { color: #888; font-size: 0.85em; display: inline-block; width: 130px; }
        
        .Active { border-left-color: #2ecc71; }
        .Expired { border-left-color: #e74c3c; }
        .Due { border-left-color: #f1c40f; }
        .Complimentary { border-left-color: #9b59b6; }

        /* BUTTONS */
        button { cursor: pointer; font-weight: bold; transition: 0.3s; border: none; }
        .btn-main { background: var(--accent); color: white; padding: 12px 20px; border-radius: 8px; }
        .btn-print { background: #2d3436; color: white; margin-bottom: 15px; padding: 12px 24px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        .btn-edit { background: #3498db; color: white; padding: 6px 15px; border-radius: 4px; }
        .btn-del { background: #ff7675; color: white; padding: 6px 15px; border-radius: 4px; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; }

        /* EDIT MODAL */
        #editModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:30px; border-radius:15px; width:90%; max-width:480px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-content label { display: block; font-weight: bold; margin-top: 10px; color: #666; font-size: 0.9em; }
        .modal-content input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        @media (max-width: 800px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .action-bar { flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGIN PAGE -->
    <div id="login-section">
        <div class="login-card">
            <h1>VRV Dashboard</h1>
            <input type="password" id="passInput" placeholder="Enter Password"><br>
            <button class="btn-main" onclick="login()">Access Database</button>
            <p id="login-err" style="color:red; margin-top:10px;"></p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-section" style="display:none;">
        <button class="btn-print" onclick="printAddresses()">🖨️ Print Selected Address Labels</button>
        
        <!-- DASHBOARD GRID -->
        <div class="stats-grid">
            <div class="stat-card" onclick="setFilter('All')" id="stat-All"><h3>Total</h3><p id="count-All">0</p></div>
            <div class="stat-card" onclick="setFilter('Active')" id="stat-Active"><h3>Active</h3><p id="count-Active">0</p></div>
            <div class="stat-card" onclick="setFilter('Due')" id="stat-Due"><h3>Due</h3><p id="count-Due">0</p></div>
            <div class="stat-card" onclick="setFilter('Expired')" id="stat-Expired"><h3>Expired</h3><p id="count-Expired">0</p></div>
            <div class="stat-card" onclick="setFilter('Complimentary')" id="stat-Complimentary"><h3>Complimentary</h3><p id="count-Comp">0</p></div>
        </div>

        <!-- SEARCH AND UPDATE BAR -->
        <div class="action-bar">
            <div>
                <strong>Issue Dispatch: </strong>
                <input type="number" id="globalIssue" placeholder="Issue No." style="width:80px;">
                <button onclick="globalUpdate()" style="background:var(--primary); color:white; padding:10px 15px; margin-left:5px;">Update All</button>
            </div>
            <input type="text" id="search" placeholder="🔍 Search name..." onkeyup="renderCards()" style="width: 280px;">
        </div>

        <!-- MEMBER CARDS -->
        <div class="card-grid" id="cardGrid"></div>
    </div>
</div>

<!-- EDIT POPUP -->
<div id="editModal">
    <div class="modal-content">
        <h3 style="margin-top:0;">Edit Subscriber Info</h3>
        <div id="editFields"></div>
        <div style="margin-top:20px;">
            <button onclick="saveEdit()" style="background:#2ecc71; color:white; width:100%; padding:12px; border-radius:8px;">Save Changes</button>
            <button onclick="closeModal()" style="width:100%; margin-top:10px; background:#ecf0f1; padding:10px; border-radius:8px;">Cancel</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVWbU0vPKMbVft_BFA9JRfwYxlgd9HSHvkB_LdRlZA82zduveAqz6HpsGFlmKY9u8c/exec';
    const PASS = 'Varta@2020';
    
    // FIELDS BASED ON YOUR EXCEL
    const DISPLAY_FIELDS = ["Address", "Mobile Number", "Subscriptuon Start", "Last issue Sent", "Status"];
    const EDIT_FIELDS = ["Name", "Address", "Mobile Number", "Subscriptuon Start", "Last issue Sent", "Status"];

    let MASTER_DATA = [];
    let CURRENT_FILTER = 'All';
    let EDITING_ROW_ID = null;

    function login() {
        const inp = document.getElementById('passInput').value;
        if(inp === PASS) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            fetchData();
        } else {
            document.getElementById('login-err').innerText = "Incorrect Password!";
        }
    }

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL);
            MASTER_DATA = await res.json();
            updateStats();
            renderCards();
        } catch (e) {
            alert("Error fetching data. Check your Script URL.");
        }
    }

    function setFilter(f) {
        CURRENT_FILTER = f;
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
        document.getElementById('stat-' + f).classList.add('active-filter');
        renderCards();
    }

    function updateStats() {
        const counts = { All: MASTER_DATA.length, Active: 0, Due: 0, Expired: 0, Complimentary: 0 };
        MASTER_DATA.forEach(row => { if(counts[row.Status] !== undefined) counts[row.Status]++; });
        document.getElementById('count-All').innerText = counts.All;
        document.getElementById('count-Active').innerText = counts.Active;
        document.getElementById('count-Due').innerText = counts.Due;
        document.getElementById('count-Expired').innerText = counts.Expired;
        document.getElementById('count-Comp').innerText = counts.Complimentary;
    }

    function renderCards() {
        const grid = document.getElementById('cardGrid');
        const query = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";

        const filtered = MASTER_DATA.filter(row => {
            const matchesFilter = (CURRENT_FILTER === 'All' || row.Status === CURRENT_FILTER);
            const matchesSearch = (row.Name || "").toLowerCase().includes(query);
            return matchesFilter && matchesSearch;
        });

        filtered.forEach(row => {
            const card = document.createElement('div');
            card.className = `mag-card ${row.Status || ''}`;
            
            let content = `<h2>${row.Name || ''}</h2>`;
            DISPLAY_FIELDS.forEach(field => {
                content += `<p><strong>${field}:</strong> ${row[field] || ''}</p>`;
            });

            content += `<div class="btn-group">
                <button class="btn-edit" onclick="openEdit(${row.rowId})">Edit</button>
                <button class="btn-del" onclick="deleteRow(${row.rowId})">Delete</button>
            </div>`;
            card.innerHTML = content;
            grid.appendChild(card);
        });
    }

    function openEdit(id) {
        EDITING_ROW_ID = id;
        const row = MASTER_DATA.find(r => r.rowId === id);
        const container = document.getElementById('editFields');
        container.innerHTML = "";
        
        EDIT_FIELDS.forEach(key => {
            container.innerHTML += `<label>${key}</label><input type="text" id="edit_${key}" value="${row[key] || ''}">`;
        });
        document.getElementById('editModal').style.display = 'flex';
    }

    async function saveEdit() {
        const updatedData = {};
        EDIT_FIELDS.forEach(key => {
            updatedData[key] = document.getElementById('edit_'+key).value;
        });
        
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "edit", rowId: EDITING_ROW_ID, updatedData }) });
        closeModal();
        fetchData();
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    async function globalUpdate() {
        const val = document.getElementById('globalIssue').value;
        if(!val) return alert("Please enter an issue number (e.g., 34)");
        
        if(!confirm("Update 'Last issue Sent' to " + val + " for ALL subscribers?")) return;
        
        const btn = document.querySelector("button[onclick='globalUpdate()']");
        btn.innerText = "Updating...";

        try {
            const response = await fetch(SCRIPT_URL, { 
                method: "POST", 
                body: JSON.stringify({ action: "globalUpdate", newValue: val }) 
            });
            const result = await response.text();
            alert(result);
            fetchData(); // Refresh cards
        } catch (e) {
            alert("Error: " + e);
        } finally {
            btn.innerText = "Update All";
        }
    }
    async function deleteRow(id) {
        if(!confirm("Delete this subscriber permanently?")) return;
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", rowId: id }) });
        fetchData();
    }

    function printAddresses() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = MASTER_DATA.filter(row => {
            const matchesFilter = (CURRENT_FILTER === 'All' || row.Status === CURRENT_FILTER);
            const matchesSearch = (row.Name || "").toLowerCase().includes(query);
            return matchesFilter && matchesSearch;
        });

        let win = window.open('', '_blank');
        win.document.write(`<html><head><title>Address Labels</title><style>
            body { font-family: sans-serif; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
            .box { border: 1.5px solid #000; padding: 15px; font-size: 13px; height: 150px; display: flex; flex-direction: column; justify-content: center; border-radius: 5px; }
            .name { font-weight: bold; font-size: 16px; margin-bottom: 5px; text-transform: uppercase; border-bottom: 1px solid #ddd; }
            .mob { margin-top: 10px; font-weight: bold; }
        </style></head><body>`);
        
        filtered.forEach(row => {
            win.document.write(`
                <div class="box">
                    <div class="name">${row.Name || ''}</div>
                    <div>${row.Address || ''}</div>
                    <div class="mob">Mobile Number: ${row['Mobile Number'] || ''}</div>
                </div>
            `);
        });
        
        win.document.write('</body></html>');
        win.document.close();
        setTimeout(() => { win.print(); }, 700);
    }
</script>
</body>
</html>
