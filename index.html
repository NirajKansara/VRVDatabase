<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRV Dasboard</title>
    <style>
        :root { --bg: #f4f7f6; --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        /* RESTORED STATS DESIGN */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid #ddd; }
        .stat-card h3 { margin: 0; font-size: 0.9em; color: #666; }
        .stat-card p { margin: 5px 0 0; font-size: 1.5em; font-weight: bold; color: var(--primary); }
        .stat-card.active-filter { border-top-color: var(--accent); background: #eef7ff; }

        /* CARD DESIGN */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .mag-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #ddd; }
        .mag-card h2 { margin: 0 0 10px; font-size: 1.2em; color: var(--primary); text-transform: uppercase; }
        .mag-card p { margin: 5px 0; color: #555; font-size: 0.95em; }
        
        /* STATUS COLORS */
        .Active { border-left-color: #2ecc71; }
        .Expired { border-left-color: #e74c3c; }
        .Due { border-left-color: #f1c40f; }
        .Complimentary { border-left-color: #9b59b6; }

        /* RESTORED BUTTONS */
        .btn-group { margin-top: 15px; display: flex; gap: 10px; }
        button { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-edit { background: #3498db; color: white; }
        .btn-del { background: #ff7675; color: white; }
        .btn-print { background: #2d3436; color: white; margin-bottom: 20px; }
        .btn-print:hover { background: #000; }

        /* MODAL */
        #editModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:100; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:25px; border-radius:10px; width:90%; max-width:450px; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; }

        .no-print { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" style="text-align:center; padding-top:100px;">
        <h1>VRV Dashboard</h1>
        <input type="password" id="passInput" placeholder="Password" style="padding:10px; width: 200px; border-radius:5px; border:1px solid #ccc;">
        <button onclick="login()" style="background:var(--accent); color:white; padding:10px 20px;">Login</button>
    </div>

    <div id="app-section" style="display:none;">
        <!-- RESTORED PRINT BUTTON SIZE -->
        <button class="btn-print no-print" onclick="printAddresses()">🖨️ Print Address Labels</button>
        
        <!-- RESTORED DASHBOARD SIZE -->
        <div class="stats-grid no-print">
            <div class="stat-card" onclick="setFilter('All')" id="stat-All"><h3>Total</h3><p id="count-All">0</p></div>
            <div class="stat-card" onclick="setFilter('Active')" id="stat-Active"><h3>Active</h3><p id="count-Active">0</p></div>
            <div class="stat-card" onclick="setFilter('Due')" id="stat-Due"><h3>Due</h3><p id="count-Due">0</p></div>
            <div class="stat-card" onclick="setFilter('Expired')" id="stat-Expired"><h3>Expired</h3><p id="count-Expired">0</p></div>
            <div class="stat-card" onclick="setFilter('Complimentary')" id="stat-Complimentary"><h3>Complimentary</h3><p id="count-Comp">0</p></div>
        </div>

        <div style="background:white; padding:15px; border-radius:8px; margin-bottom:20px; display: flex; justify-content: space-between; align-items: center;" class="no-print">
            <div>
                <strong>Issue Dispatch: </strong>
                <input type="number" id="globalIssue" placeholder="No." style="width:60px; padding:5px;">
                <button onclick="globalUpdate()" style="background:var(--primary); color:white; padding:5px 10px;">Update All</button>
            </div>
            <input type="text" id="search" placeholder="Search name..." onkeyup="renderCards()" style="padding:8px; width: 200px;">
        </div>

        <div class="card-grid" id="cardGrid"></div>
    </div>
</div>

<div id="editModal">
    <div class="modal-content">
        <h3>Edit Subscriber</h3>
        <div id="editFields"></div>
        <button onclick="saveEdit()" style="background:#2ecc71; color:white; width:100%; padding:10px;">Save Changes</button>
        <button onclick="closeModal()" style="width:100%; margin-top:10px; background:#ccc;">Cancel</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVWbU0vPKMbVft_BFA9JRfwYxlgd9HSHvkB_LdRlZA82zduveAqz6HpsGFlmKY9u8c/exec';
    const PASS = 'Varta@2020';
    
    // SPECIFIC COLUMNS
    const DISPLAY_FIELDS = ["Address", "Mobile Number", "Subscriptuon Start", "Last issue Sent", "Status"];
    const ALL_FIELDS = ["Name", "Address", "Mobile Number", "Subscriptuon Start", "Last issue Sent", "Status"];

    let MASTER_DATA = [];
    let CURRENT_FILTER = 'All';
    let EDITING_ROW_ID = null;

    function login() {
        if(document.getElementById('passInput').value === PASS) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            fetchData();
        }
    }

    async function fetchData() {
        const res = await fetch(SCRIPT_URL);
        MASTER_DATA = await res.json();
        updateStats();
        renderCards();
    }

    function setFilter(f) {
        CURRENT_FILTER = f;
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
        document.getElementById('stat-' + f).classList.add('active-filter');
        renderCards();
    }

    function updateStats() {
        const counts = { All: MASTER_DATA.length, Active: 0, Due: 0, Expired: 0, Complimentary: 0 };
        MASTER_DATA.forEach(row => { if(counts[row.Status] !== undefined) counts[row.Status]++; });
        document.getElementById('count-All').innerText = counts.All;
        document.getElementById('count-Active').innerText = counts.Active;
        document.getElementById('count-Due').innerText = counts.Due;
        document.getElementById('count-Expired').innerText = counts.Expired;
        document.getElementById('count-Comp').innerText = counts.Complimentary;
    }

    function renderCards() {
        const grid = document.getElementById('cardGrid');
        const query = document.getElementById('search').value.toLowerCase();
        grid.innerHTML = "";

        const filtered = MASTER_DATA.filter(row => {
            const matchesFilter = (CURRENT_FILTER === 'All' || row.Status === CURRENT_FILTER);
            const matchesSearch = (row.Name || "").toLowerCase().includes(query);
            return matchesFilter && matchesSearch;
        });

        filtered.forEach(row => {
            const card = document.createElement('div');
            card.className = `mag-card ${row.Status || ''}`;
            let content = `<h2>${row.Name || ''}</h2>`;
            DISPLAY_FIELDS.forEach(field => {
                content += `<p><strong>${field}:</strong> ${row[field] || ''}</p>`;
            });
            content += `<div class="btn-group">
                <button class="btn-edit" onclick="openEdit(${row.rowId})">Edit</button>
                <button class="btn-del" onclick="deleteRow(${row.rowId})">Delete</button>
            </div>`;
            card.innerHTML = content;
            grid.appendChild(card);
        });
    }

    function openEdit(id) {
        EDITING_ROW_ID = id;
        const row = MASTER_DATA.find(r => r.rowId === id);
        const container = document.getElementById('editFields');
        container.innerHTML = "";
        ALL_FIELDS.forEach(key => {
            container.innerHTML += `<label>${key}</label><input type="text" id="edit_${key}" value="${row[key] || ''}">`;
        });
        document.getElementById('editModal').style.display = 'flex';
    }

    async function saveEdit() {
        const updatedData = {};
        ALL_FIELDS.forEach(key => {
            updatedData[key] = document.getElementById('edit_'+key).value;
        });
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "edit", rowId: EDITING_ROW_ID, updatedData }) });
        closeModal();
        fetchData();
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    async function globalUpdate() {
        const val = document.getElementById('globalIssue').value;
        if(!val || !confirm("Update ALL to Issue " + val + "?")) return;
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "globalUpdate", newValue: val }) });
        fetchData();
    }

    async function deleteRow(id) {
        if(!confirm("Delete this subscriber?")) return;
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "delete", rowId: id }) });
        fetchData();
    }

    function printAddresses() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = MASTER_DATA.filter(row => {
            const matchesFilter = (CURRENT_FILTER === 'All' || row.Status === CURRENT_FILTER);
            const matchesSearch = (row.Name || "").toLowerCase().includes(query);
            return matchesFilter && matchesSearch;
        });

        let printWindow = window.open('', '_blank');
        printWindow.document.write(`<html><head><title>Print Labels</title><style>
            body { font-family: sans-serif; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px; }
            .label-box { border: 1px solid #000; padding: 10px; font-size: 13px; height: 140px; display: flex; flex-direction: column; justify-content: center; }
            .p-name { font-weight: bold; font-size: 15px; border-bottom: 1px solid #ccc; margin-bottom: 5px; text-transform: uppercase; }
            .p-mob { margin-top: 5px; font-weight: bold; }
        </style></head><body>`);
        
        filtered.forEach(row => {
            printWindow.document.write(`
                <div class="label-box">
                    <div class="p-name">${row.Name || ''}</div>
                    <div class="p-addr">${row.Address || ''}</div>
                    <div class="p-mob">Mobile Number: ${row['Mobile Number'] || ''}</div>
                </div>
            `);
        });
        
        printWindow.document.write('</body></html>');
        printWindow.document.close();
        setTimeout(() => { printWindow.print(); }, 500);
    }
</script>
</body>
</html>
